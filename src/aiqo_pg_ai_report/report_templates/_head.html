<style>
    .bi-database-exclamation {
        color: red !important;
    }
    .bi-chat-left-text {
        color: blue !important;
    }
    .bi-lightning {
        color: green !important;
    }

    .nav-tabs {
        display: flex;
        flex-direction: row; /* Onglets horizontaux */
        border-bottom: 1px solid #dee2e6; /* Restaurer la bordure inférieure par défaut */
        padding-left: 0; /* Supprimer le padding par default de l'UL */
        margin-bottom: 0; /* Supprimer la marge par default de l'UL */
        height: 120px; /* Hauteur suffisante pour les onglets pivotés */
        align-items: flex-end; /* Aligner les onglets en bas de la barre */
    }

    .nav-tabs .nav-item {
        margin-bottom: 0;
        position: relative; /* Pour le positionnement absolu du nav-link */
        width: 25px; /* Largeur de l'onglet (sa "tranche") */
        height: 100%; /* Prend toute la hauteur disponible dans .nav-tabs */
        margin-right: 2px; /* Espace entre les onglets */
    }

    .nav-tabs .nav-link {
        border: 1px solid transparent;
        border-top-left-radius: 0.25rem;
        border-top-right-radius: 0.25rem;
        border-bottom-left-radius: 0;
        border-bottom-right-radius: 0;
        text-align: center;
        padding: 0.5rem 0.75rem; /* Padding pour le texte */
        color: #007bff;
        background-color: transparent;

        white-space: nowrap; /* Empêcher le texte de passer à la ligne */
        display: block; /* Nécessaire pour la transformation */
        
        /* Positionnement et rotation */
        position: absolute; /* Positionner absolument dans le nav-item */
        bottom: 0; /* Aligner en bas du nav-item */
        left: 25px; /* Adjusted to compensate for rotation shift */
        transform: rotate(-90deg); /* Pivoter */
        transform-origin: bottom left; /* Pivoter autour du coin inférieur gauche */

        /* Définir les dimensions originales du nav-link */
        /* La largeur originale (ex: 100px) devient la HAUTEUR après rotation */
        /* La hauteur originale (ex: 25px) devient la LARGEUR après rotation */
        width: 100px; /* Largeur originale qui devient la HAUTEUR après rotation */
        height: 25px; /* Hauteur originale qui devient la LARGEUR après rotation */
        
        /* Centrer le texte à l'intérieur de la boîte pivotée */
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .nav-tabs .nav-link.active {
        border-color: #dee2e6 #dee2e6 #fff #dee2e6; /* L'onglet actif a une bordure inférieure blanche */
        background-color: #e7f1ff; /* Light blue background for active tab */
        color: #495057; /* Couleur du texte de l'onglet actif */
    }

    .tab-content {
        /* padding-top: 120px; /* Ajuster pour laisser de l'espace aux onglets plus hauts */ */
        clear: both; /* S'assurer que le contenu commence en dessous des onglets */
    }
</style>
