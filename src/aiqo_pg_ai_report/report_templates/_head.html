<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ metadata.title }}</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,{{ 'static/img/report-favicon.svg' | embed_image }}">
<link rel="shortcut icon" href="data:image/svg+xml;base64,{{ 'static/img/report-favicon.svg' | embed_image }}">
<script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
<script src="https://unpkg.com/vue@3.2.45/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/pev2/dist/pev2.umd.js"></script>
<link href="https://unpkg.com/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
<link rel="stylesheet" href="https://unpkg.com/pev2/dist/pev2.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@latest/dist/chartjs-plugin-annotation.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<script src="https://unpkg.com/split.js/dist/split.min.js"></script>

<!-- Global report data and legacy variables -->
<script>
    const {createApp} = Vue;
    const {Duration} = luxon;
    
    // Global report data prepared by backend
    const reportData = {{ context_json | safe }};
    
    // Expose reportData globally for debugging and navigation
    window.reportData = reportData;
    
    // Legacy compatibility - keep these for backward compatibility with inline scripts
    const dailyQueryStats = reportData.statistics.daily_stats;
    const globalQueryStats = reportData.statistics.global_query_stats;
    const queryOptimizations = reportData.optimizations.query;
    const serverOptimizations = reportData.optimizations.server;
    const eventOptimizations = reportData.optimizations.event;
</script>

<!-- Custom report styles - embedded and minified -->
<style>
{% filter minify_css %}
{% include 'static/css/report-icons.css' %}
{% include 'static/css/report-sidebar.css' %}
{% include 'static/css/report-day-view.css' %}
{% include 'static/css/report-plan-compare.css' %}
{% endfilter %}
</style>
