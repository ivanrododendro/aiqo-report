<!-- Inline JavaScript to produce a fully self-contained HTML report -->
<script>
{% include 'static/js/report-utils.js' %}
</script>

<script>
{% include 'static/js/report-charts.js' %}
</script>

<script>
{% include 'static/js/report-navigation.js' %}
</script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        console.log("Initializing report with data:", reportData);
        
        // === TEST TAPPA 1: Verifica struttura date_hierarchy ===
        console.log("\n=== TEST TAPPA 1: Struttura Date Hierarchy ===");
        if (reportData.date_hierarchy) {
            console.log("✅ date_hierarchy presente nel reportData");
            console.log("📅 Anni disponibili:", reportData.date_hierarchy.all_years);
            console.log("📅 Mesi disponibili:", reportData.date_hierarchy.all_months);
            console.log("📅 Giorni totali:", reportData.date_hierarchy.all_days.length);
            
            // Verifica struttura dettagliata per ogni anno
            reportData.date_hierarchy.all_years.forEach(year => {
                const yearData = reportData.date_hierarchy.years[year];
                console.log(`\n📆 Anno ${year}:`);
                console.log(`   - Numero mesi: ${Object.keys(yearData.months).length}`);
                console.log(`   - Numero giorni: ${yearData.all_days.length}`);
                
                // Mostra i primi 3 mesi di questo anno come esempio
                const monthEntries = Object.entries(yearData.months).slice(0, 3);
                monthEntries.forEach(([monthNum, monthData]) => {
                    console.log(`   └─ ${monthData.name} (${monthData.year_month}): ${monthData.days.length} giorni`);
                    // Mostra i primi 3 giorni del mese
                    if (monthData.days.length > 0) {
                        const sampleDays = monthData.days.slice(0, 3).join(', ');
                        console.log(`      Esempio giorni: ${sampleDays}${monthData.days.length > 3 ? '...' : ''}`);
                    }
                });
                
                if (Object.keys(yearData.months).length > 3) {
                    console.log(`   ... e altri ${Object.keys(yearData.months).length - 3} mesi`);
                }
            });
            
            console.log("\n✅ TAPPA 1 COMPLETATA: La struttura gerarchica è pronta per la navigazione");
        } else {
            console.error("❌ TAPPA 1 FALLITA: date_hierarchy non trovato in reportData!");
            console.log("Struttura reportData disponibile:", Object.keys(reportData));
        }
        console.log("=== FINE TEST TAPPA 1 ===\n");
        // === FINE TEST TAPPA 1 ===
        
        // === TEST TAPPA 2: Verifica tab degli anni ===
        console.log("\n=== TEST TAPPA 2: Tab degli Anni ===");
        const yearTabs = document.querySelectorAll('#yearTabs .nav-link');
        console.log("✅ Numero tab anni trovati:", yearTabs.length);
        
        yearTabs.forEach((tab, index) => {
            const yearText = tab.textContent.trim();
            const isActive = tab.classList.contains('active');
            console.log(`   ${index + 1}. Anno: ${yearText} ${isActive ? '(ATTIVO)' : ''}`);
        });
        
        // Verifica che il tab attivo corrisponda all'ultimo anno
        const activeYearTab = document.querySelector('#yearTabs .nav-link.active');
        if (activeYearTab) {
            console.log("✅ Tab anno attivo:", activeYearTab.textContent.trim());
        } else {
            console.error("❌ Nessun tab anno attivo trovato!");
        }
        
        // Verifica contenuto del tab attivo
        const activeYearPane2 = document.querySelector('#yearTabContent .tab-pane.active');
        if (activeYearPane2) {
            const daysCount = activeYearPane2.querySelectorAll('.accordion').length;
            console.log("✅ Giorni visualizzati nel tab attivo:", daysCount);
        }
        
        console.log("\n📋 TEST MANUALE SUGGERITO:");
        console.log("   1. Clicca su ogni tab anno e verifica che il contenuto cambi");
        console.log("   2. Verifica che ogni anno mostri i suoi giorni");
        console.log("   3. Verifica che gli accordion delle query funzionino ancora");
        console.log("=== FINE TEST TAPPA 2 ===\n");
        // === FINE TEST TAPPA 2 ===
        
        // === TEST TAPPA 3: Verifica tab dei mesi ===
        console.log("\n=== TEST TAPPA 3: Tab dei Mesi ===");
        
        // Verifica tab mesi per ogni anno
        const allMonthTabs = document.querySelectorAll('.month-tabs');
        console.log("✅ Numero gruppi di tab mesi (uno per anno):", allMonthTabs.length);
        
        allMonthTabs.forEach((monthTabGroup, yearIndex) => {
            const yearId = monthTabGroup.id.replace('monthTabs-', '');
            const monthLinks = monthTabGroup.querySelectorAll('.nav-link');
            console.log(`\n📅 Anno ${yearId}:`);
            console.log(`   - Numero mesi: ${monthLinks.length}`);
            
            monthLinks.forEach((link, monthIndex) => {
                const monthName = link.textContent.trim();
                const isActive = link.classList.contains('active');
                console.log(`      ${monthIndex + 1}. ${monthName} ${isActive ? '(ATTIVO)' : ''}`);
            });
        });
        
        // Verifica il mese attivo nell'anno attivo
        const activeYearPane3 = document.querySelector('#yearTabContent .tab-pane.active');
        if (activeYearPane3) {
            const activeMonthTab = activeYearPane3.querySelector('.month-tabs .nav-link.active');
            if (activeMonthTab) {
                console.log("\n✅ Mese attivo nell'anno attivo:", activeMonthTab.textContent.trim());
                
                // Verifica contenuto del mese attivo
                const activeMonthPane = activeYearPane3.querySelector('.month-tab-content .tab-pane.active');
                if (activeMonthPane) {
                    const daysCount = activeMonthPane.querySelectorAll('.accordion').length;
                    console.log("✅ Giorni visualizzati nel mese attivo:", daysCount);
                }
            } else {
                console.error("❌ Nessun tab mese attivo trovato!");
            }
        }
        
        console.log("\n📋 TEST MANUALE SUGGERITO:");
        console.log("   1. Clicca su diversi tab anno e verifica che i tab mesi cambino");
        console.log("   2. Clicca su diversi tab mesi e verifica che il contenuto cambi");
        console.log("   3. Verifica che ogni mese mostri solo i suoi giorni");
        console.log("   4. Verifica che gli accordion delle query funzionino ancora");
        console.log("=== FINE TEST TAPPA 3 ===\n");
        // === FINE TEST TAPPA 3 ===
        
        // === TEST TAPPA 4: Verifica tab dei giorni ===
        console.log("\n=== TEST TAPPA 4: Tab dei Giorni ===");
        
        // Verifica tab giorni per ogni mese
        const allDayTabs = document.querySelectorAll('.day-tabs');
        console.log("✅ Numero gruppi di tab giorni (uno per mese):", allDayTabs.length);
        
        // Mostra dettagli solo per il mese attivo
        const activeMonthPane4 = document.querySelector('.month-tab-content .tab-pane.active');
        if (activeMonthPane4) {
            const activeDayTabGroup = activeMonthPane4.querySelector('.day-tabs');
            if (activeDayTabGroup) {
                const monthId = activeDayTabGroup.id.replace('dayTabs-', '');
                const dayLinks = activeDayTabGroup.querySelectorAll('.nav-link');
                console.log(`\n📅 Mese attivo (${monthId}):`);
                console.log(`   - Numero giorni: ${dayLinks.length}`);
                
                // Mostra i primi 5 giorni come esempio
                dayLinks.forEach((link, dayIndex) => {
                    if (dayIndex < 5) {
                        const dayNum = link.textContent.trim();
                        const isActive = link.classList.contains('active');
                        console.log(`      ${dayIndex + 1}. Giorno ${dayNum} ${isActive ? '(ATTIVO)' : ''}`);
                    }
                });
                
                if (dayLinks.length > 5) {
                    console.log(`      ... e altri ${dayLinks.length - 5} giorni`);
                }
                
                // Verifica il giorno attivo
                const activeDayTab = activeDayTabGroup.querySelector('.nav-link.active');
                if (activeDayTab) {
                    console.log(`\n✅ Giorno attivo: ${activeDayTab.textContent.trim()}`);
                    
                    // Verifica contenuto del giorno attivo
                    const activeDayPane = activeMonthPane4.querySelector('.day-tab-content .tab-pane.active');
                    if (activeDayPane) {
                        const queriesCount = activeDayPane.querySelectorAll('.accordion-item').length;
                        console.log(`✅ Query visualizzate nel giorno attivo: ${queriesCount}`);
                    }
                } else {
                    console.error("❌ Nessun tab giorno attivo trovato!");
                }
            }
        }
        
        console.log("\n📋 TEST MANUALE SUGGERITO:");
        console.log("   1. Naviga: Anno → Mese → Giorno e verifica che tutto funzioni");
        console.log("   2. Clicca su diversi tab giorni e verifica che il contenuto cambi");
        console.log("   3. Verifica che ogni giorno mostri solo le sue query");
        console.log("   4. Verifica che gli accordion delle query funzionino ancora");
        console.log("   5. Espandi un accordion e verifica che il grafico si carichi");
        console.log("=== FINE TEST TAPPA 4 ===\n");
        // === FINE TEST TAPPA 4 ===
        
        // === TEST TAPPA 5: Verifica layout a 2 colonne con query laterali ===
        console.log("\n=== TEST TAPPA 5: Layout a 2 Colonne ===");
        
        // Verifica presenza tab query laterali
        const allQueryTabs = document.querySelectorAll('.query-tabs');
        console.log("✅ Numero gruppi di tab query (uno per giorno):", allQueryTabs.length);
        
        // Verifica il giorno attivo
        const activeDayPane5 = document.querySelector('.day-tab-content .tab-pane.active');
        if (activeDayPane5) {
            const queryTabGroup = activeDayPane5.querySelector('.query-tabs');
            if (queryTabGroup) {
                const queryLinks = queryTabGroup.querySelectorAll('.nav-link');
                console.log(`\n📋 Giorno attivo:`);
                console.log(`   - Numero query: ${queryLinks.length}`);
                
                // Mostra le prime 3 query come esempio
                queryLinks.forEach((link, queryIndex) => {
                    if (queryIndex < 3) {
                        const queryCode = link.getAttribute('data-query-code');
                        const isActive = link.classList.contains('active');
                        console.log(`      ${queryIndex + 1}. Query ${queryCode?.substring(0, 8)} ${isActive ? '(ATTIVA)' : ''}`);
                    }
                });
                
                if (queryLinks.length > 3) {
                    console.log(`      ... e altre ${queryLinks.length - 3} query`);
                }
                
                // Verifica la query attiva
                const activeQueryTab = queryTabGroup.querySelector('.nav-link.active');
                if (activeQueryTab) {
                    const activeQueryCode = activeQueryTab.getAttribute('data-query-code');
                    console.log(`\n✅ Query attiva: ${activeQueryCode?.substring(0, 8)}`);
                    
                    // Verifica contenuto della query attiva
                    const activeQueryContent = activeDayPane5.querySelector('.query-tab-content .tab-pane.active');
                    if (activeQueryContent) {
                        const hasChart = activeQueryContent.querySelector('canvas');
                        const hasPlan = activeQueryContent.querySelector('[id^="app-"]');
                        const hasQueryText = activeQueryContent.querySelector('pre code');
                        console.log(`✅ Contenuto query visualizzato:`);
                        console.log(`   - Grafico: ${hasChart ? 'Sì' : 'No'}`);
                        console.log(`   - Container pev2: ${hasPlan ? 'Sì' : 'No'}`);
                        if (hasPlan) {
                            const pev2Content = hasPlan.querySelector('.pev2');
                            console.log(`   - pev2 renderizzato: ${pev2Content ? 'Sì' : 'No'}`);
                        }
                    }
                } else {
                    console.error("❌ Nessun tab query attivo trovato!");
                }
                
                // Verifica layout a 2 colonne
                const leftColumn = activeDayPane5.querySelector('.col-md-3');
                const rightColumn = activeDayPane5.querySelector('.col-md-9');
                console.log(`\n✅ Layout a 2 colonne:`);
                console.log(`   - Colonna sinistra (query): ${leftColumn ? 'Presente' : 'Mancante'}`);
                console.log(`   - Colonna destra (dettaglio): ${rightColumn ? 'Presente' : 'Mancante'}`);
            }
        }
        
        console.log("\n📋 TEST MANUALE SUGGERITO:");
        console.log("   1. Verifica che le query siano visualizzate in tab verticali a sinistra");
        console.log("   2. Clicca su diverse query e verifica che il dettaglio cambi a destra");
        console.log("   3. Verifica che il grafico si carichi per ogni query");
        console.log("   4. Verifica che il piano di esecuzione (pev2) si visualizzi correttamente");
        console.log("   5. Verifica il layout responsive (riduci la finestra del browser)");
        console.log("=== FINE TEST TAPPA 5 ===\n");
        // === FINE TEST TAPPA 5 ===
        
        // Wait a bit for pev2 to render, then check
        setTimeout(() => {
            console.log("\n=== VERIFICA POST-CARICAMENTO pev2 ===");
            const allPev2Containers = document.querySelectorAll('[id^="app-"]');
            console.log(`Totale container pev2: ${allPev2Containers.length}`);
            
            let mountedCount = 0;
            let renderedCount = 0;
            
            allPev2Containers.forEach(container => {
                if (container.hasAttribute('data-v-app')) {
                    mountedCount++;
                    const pev2Element = container.querySelector('.pev2');
                    if (pev2Element) {
                        renderedCount++;
                    }
                }
            });
            
            console.log(`Container con Vue montato: ${mountedCount}`);
            console.log(`Container con pev2 renderizzato: ${renderedCount}`);
            
            if (mountedCount > 0 && renderedCount === 0) {
                console.error("⚠️ Vue è montato ma pev2 non si renderizza!");
                console.log("Possibili cause:");
                console.log("  1. Dati plan/query non validi");
                console.log("  2. Componente pev2 non caricato correttamente");
                console.log("  3. Errore nel template Vue");
            }
            console.log("=== FINE VERIFICA pev2 ===\n");
        }, 1500);

        // Initialize managers
        window.reportChartManager = new ReportChartManager(reportData);
        window.reportNavigator = new ReportNavigator(reportData);

        // Render main charts
        reportChartManager.renderDailyCumulatedTimeChart();

        // Setup navigation
        reportNavigator.setupNavigationHandlers();

        // Populate optimization legend
        const genericLegendContainer = document.getElementById('genericOptimizationLegend');
        const legendEntries = reportData.optimizations.annotations.legend_entries.generic;
        
        if (legendEntries.length > 0) {
            let legendHtml = '<p>Les lettres sur les graphiques correspondent aux optimisations suivantes :</p><ul>';
            legendEntries.sort((a, b) => a.id.localeCompare(b.id)).forEach(entry => {
                legendHtml += `<li><strong>${entry.id}</strong>`;
                if (entry.query_code) {
                    legendHtml += ` [${entry.query_code.substring(0, 6)}]`;
                }
                if(entry.type === 'Serveur') {
                    legendHtml += `: <code>${entry.text}</code></li>`;
                } else {
                    legendHtml += `: ${entry.text}</li>`;
                }
            });
            legendHtml += '</ul>';
            genericLegendContainer.innerHTML = legendHtml;
        } else {
            genericLegendContainer.innerHTML = '<p>Aucune optimisation enregistrée.</p>';
        }

        // Initialize duration displays for global query stats
        {% for stat in statistics.global_query_stats %}
        (function() {
            const safeCode = ReportUtils.safeId('{{ stat.code | safe }}');
            const cumulatedTimeEl = document.getElementById('cumulated-time-' + safeCode);
            if (cumulatedTimeEl) {
                cumulatedTimeEl.innerHTML = Duration.fromMillis({{ stat.cumulated_time }}).toFormat("h'h'm'm's's'");
            }
        })();
        {% endfor %}

        // Setup query tab event handlers for query details (TAPPA 5)
        {% for day, reports_list in reports.by_day.items()|sort %}
        {% for report in reports_list %}
        {% set i = loop.index0 %}
        {% set app_id = 'app-' ~ day | safe_id ~ '-' ~ i %}
        (function() {
            const queryTabEl = document.getElementById('query-tab-{{ day | safe_id }}-{{ i }}');
            if (!queryTabEl) return;

            // Function to initialize query details
            const initializeQueryDetails = function() {
                // Initialize query execution details card
                const detailsCard = document.getElementById("query-details-card-{{ app_id }}");
                if (detailsCard) {
                    const durationMillis = {{ report.duration|int }};
                    const timestampUtc = {{ report.query_timestamp_utc|default('null') }};
                    let endTime = null;

                    if (timestampUtc && Number.isFinite(timestampUtc)) {
                        endTime = luxon.DateTime.fromMillis(timestampUtc, { zone: "utc" });
                    }

                    // Compute startTime robustly after confirming endTime validity
                    let validStart = "N/A";
                    if (endTime && endTime.isValid && Number.isFinite(durationMillis) && durationMillis > 0) {
                        const startMillis = endTime.toMillis() - durationMillis;
                        if (startMillis > 0) {
                            const startTime = luxon.DateTime.fromMillis(startMillis, { zone: "utc" });
                            if (startTime.isValid) {
                                validStart = startTime.toFormat("yyyy-MM-dd HH:mm:ss");
                            }
                        }
                    }

                    const validEnd = (endTime && endTime.isValid)
                        ? endTime.toFormat("yyyy-MM-dd HH:mm:ss")
                        : (timestampUtc ? (new Date(timestampUtc)).toISOString() : "N/A");
                    const durationFmt = (Number.isFinite(durationMillis) && durationMillis > 0)
                        ? luxon.Duration.fromMillis(durationMillis).toFormat("h'h'm'm's's'")
                        : "N/A";

                    const cost = {{ report.cost|default(None)|tojson }};
                    const rows = {{ report.rows|default(None)|tojson }};
                    const costFormatted = (cost !== null && !isNaN(cost)) ? Number(cost).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) : 'N/A';
                    const rowsFormatted = (rows !== null && !isNaN(rows)) ? Number(rows).toLocaleString() : 'N/A';

                    detailsCard.innerHTML = `
                        <div class="card bg-light mb-3">
                            <div class="card-body">
                                <div class="row text-nowrap">
                                    <div class="col-auto"><strong>Début :</strong> ${validStart}</div>
                                    <div class="col-auto"><strong>Fin :</strong> ${validEnd}</div>
                                    <div class="col-auto"><strong>Durée :</strong> ${durationFmt}</div>
                                    <div class="col-auto"><strong>Coût :</strong> ${costFormatted}</div>
                                    <div class="col-auto"><strong>Lignes :</strong> ${rowsFormatted}</div>
                                </div>
                            </div>
                        </div>`;
                }

                // Initialize Vue app for pev2 visualization
                const pev2Container = document.getElementById("{{ app_id }}");
                if (pev2Container) {
                    // Check if already mounted (avoid double mounting)
                    if (pev2Container.hasAttribute('data-v-app')) {
                        console.log("⚠️ pev2 già montato per {{ app_id }}, skip");
                        return;
                    }
                    
                    try {
                        const planData = `{{ report.plan|safe }}`;
                        const queryData = `{{ report.query_text|safe }}`;
                        
                        console.log("🔍 Dati pev2 per {{ app_id }}:");
                        console.log("  - Plan length:", planData.length);
                        console.log("  - Query length:", queryData.length);
                        
                        if (!planData || planData.length === 0) {
                            console.error("❌ Piano di esecuzione vuoto per {{ app_id }}");
                            pev2Container.innerHTML = '<div class="alert alert-warning">Piano di esecuzione non disponibile</div>';
                            return;
                        }
                        
                        const app = createApp({
                            data() {
                                return {
                                    plan: planData,
                                    query: queryData
                                };
                            }
                        });
                        
                        app.component("pev2", pev2.Plan);
                        app.mount("#{{ app_id }}");
                        
                        console.log("✅ pev2 montato per {{ app_id }}");
                        
                        // Verify rendering after a short delay
                        setTimeout(() => {
                            const pev2Element = pev2Container.querySelector('.pev2');
                            if (pev2Element) {
                                console.log("✅ pev2 renderizzato correttamente per {{ app_id }}");
                            } else {
                                console.error("❌ pev2 montato ma non renderizzato per {{ app_id }}");
                                console.log("  Container HTML:", pev2Container.innerHTML.substring(0, 200));
                            }
                        }, 500);
                        
                    } catch (error) {
                        console.error("❌ Errore montaggio pev2 per {{ app_id }}:", error);
                        pev2Container.innerHTML = '<div class="alert alert-danger">Errore nel caricamento del piano di esecuzione</div>';
                    }
                } else {
                    console.error("❌ Container pev2 non trovato: {{ app_id }}");
                }

                // Prepare execution data for this query
                const allExecutions = [];
                {% for d, reps in reports.by_day.items() %}
                    {% set found = False %}
                    {% for r in reps %}
                        {% if r.code == report.code %}
                            allExecutions.push({
                                timestamp: "{{ r.query_timestamp }}",
                                duration: {{ r.duration|int }},
                                cost: {{ r.cost|default(None)|tojson }},
                                rows: {{ r.rows|default(None)|tojson }}
                            });
                            {% set found = True %}
                        {% endif %}
                    {% endfor %}
                    {% if not found %}
                        allExecutions.push({
                            timestamp: "{{ d }}",
                            duration: null,
                            cost: null,
                            rows: null
                        });
                    {% endif %}
                {% endfor %}

                // Render execution time chart
                const chartId = "execTimeChart-{{ app_id }}";
                reportChartManager.destroyChart(chartId);
                const chart = reportChartManager.renderQueryExecutionChart(
                    chartId,
                    "{{ report.code }}",
                    allExecutions,
                    "{{ day }}"
                );

                // Setup chart click handler
                document.getElementById(chartId).onclick = function(evt) {
                    const points = chart.getElementsAtEventForMode(evt, 'nearest', { intersect: true }, false);
                    if (!points.length) return;

                    const idx = points[0].index;
                    const clickedDay = chart.data.labels[idx];
                    reportNavigator.navigateToQuery("{{ report.code }}", clickedDay);
                };
            };

            // Attach to tab shown event
            queryTabEl.addEventListener('shown.bs.tab', initializeQueryDetails);

            // Initialize immediately if this is the first query tab (already active)
            {% if loop.index0 == 0 %}
            // Check if this tab is currently active (visible day)
            const dayPane = document.getElementById('tab-day-{{ day | safe_id }}');
            if (dayPane && dayPane.classList.contains('active')) {
                // Small delay to ensure DOM is fully ready
                setTimeout(initializeQueryDetails, 100);
            }
            {% endif %}
        })();
        {% endfor %}
        {% endfor %}
    });
</script>
